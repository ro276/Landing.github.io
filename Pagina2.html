<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <title>Landing Page</title>
    
	
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Play", "Robot+Mono";
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            color: #333;
        }

        header {
            background-color: #2a2a2a;
            padding: 20px;
            text-align: center;
            color: #f5f5f5;
        }

        header h1 {
            font-size: 2.5em;
            font-weight: 300;
        }

        nav {
            background-color: #3d3d3d;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: #b3b3b3;
            text-decoration: none;
            margin: 0 20px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #f5f5f5;
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(135deg, #d3d3d3 0%, #a9a9a9 100%);
        }

        .hero h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        .hero p {
            font-size: 1.1em;
            color: #404040;
            margin-bottom: 30px;
        }

        .cta-button {
            background-color: #4a4a4a;
            color: #f5f5f5;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .cta-button:hover {
            background-color: #2a2a2a;
        }

        .features {
            display: flex;
            justify-content: space-around;
            padding: 60px 20px;
            background-color: #f5f5f5;
        }

        .feature {
            text-align: center;
            flex: 1;
            margin: 0 20px;
        }

        .feature h3 {
            color: #2a2a2a;
            margin-bottom: 10px;
        }

        .feature p {
            color: #666;
        }

        footer {
            background-color: #2a2a2a;
            color: #999;
            text-align: center;
            padding: 30px;
        }
        </style>
        	

							
    
</head>
<body>
    <header>
        <h1>Welcome</h1>
    </header>

    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>

    <section class="hero">
        <h2>Meet up Fight up</h2>
        <p>Create innovative solutions with modern design and technology</p>
        <button class="cta-button">Get Started</button>
    </section>

    <section class="features">
        <div class="feature">
            <h3>Feature One</h3>
            <p>Fast and reliable service</p>
        </div>
        <div class="feature">
            <h3>Feature Two</h3>
            <p>Easy to use interface</p>
        </div>
        <div class="feature">
            <h3>Feature Three</h3>
            <p>24/7 Support</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Landing Page. All rights reserved.</p>
    </footer>
</body>
</html>
